[mypy]
# AILang mypy configuration

# Stub path for llvmlite type hints
mypy_path = stubs

# Python version
python_version = 3.10

# Strict optional checking
strict_optional = True

# Warn about unused ignores
warn_unused_ignores = True

# Disallow untyped definitions (set to False for now, gradually enable)
disallow_untyped_defs = False

# Show error codes
show_error_codes = True

# Pretty output
pretty = True

# Incremental mode
incremental = True
cache_dir = .mypy_cache

# Our stubs handle this now
ignore_missing_imports = True

# Ignore type errors for packages that may have incomplete stubs in frozen envs
[mypy-black.*]
ignore_errors = True

[mypy-isort.*]
ignore_errors = True
