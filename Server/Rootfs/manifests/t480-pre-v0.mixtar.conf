# MixtarRVS pre-v0 ThinkPad T480 manifest.
#
# This is a shell-compatible manifest for the bootstrap builder. Do not put a
# plaintext password here. If normal login is needed, pass
# MIXTAR_FIRST_PASSWORD_HASH through the environment.

MIXTAR_SYSTEM_NAME="t480-mixtar-pre-v0"
MIXTAR_BUILD_DIR="/home/vxz/mixtar-lab/builds/0002-alpine-openrc-zsh"
MIXTAR_IMAGE_PATH="/home/vxz/mixtar-lab/images/mixtar-pre-v0-rootfs.ext4"
MIXTAR_IMAGE_SIZE="512M"
MIXTAR_TARGET_DEVICE="/dev/nvme0n1p3"
MIXTAR_ROOT_LABEL="MIXTARROOT"
MIXTAR_KERNEL_RELEASE="7.0.0-rc3-mixtarrvs"

MIXTAR_EXPECTED_HOSTNAME="MixtarRVS"
MIXTAR_EXPECTED_SYS_VENDOR="LENOVO"
MIXTAR_EXPECTED_PRODUCT_NAME="20L6S5FF2G"
MIXTAR_EXPECTED_PRODUCT_VERSION="ThinkPad T480"
MIXTAR_EXPECTED_CHASSIS_TYPE="10"
MIXTAR_EXPECTED_TARGET_DEVICE="/dev/nvme0n1p3"

MIXTAR_SUBSTRATE="alpine-minirootfs"
MIXTAR_LIBC="musl"
MIXTAR_PACKAGE_BACKEND="apk"
MIXTAR_INIT="openrc"
MIXTAR_USER_SHELL="zsh"
MIXTAR_LAYOUT_MODE="bootstrap-view"

MIXTAR_FIRST_USER="vxz"
